<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculatrice</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'DM Mono', monospace;
    }

    .calculator {
      background: #e8e8e8;
      border-radius: 16px;
      padding: 24px;
      width: 320px;
      box-shadow:
        8px 8px 16px #c8c8c8,
        -8px -8px 16px #ffffff;
    }

    /* Écran */
    .screen {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 20px 16px 12px;
      margin-bottom: 24px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
    }

    .screen-expression {
      font-size: 0.8rem;
      color: #666a8a;
      min-height: 20px;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .screen-result {
      font-size: 2.2rem;
      color: #ffffff;
      font-weight: 500;
      letter-spacing: 0.02em;
      word-break: break-all;
    }

    /* Grille de boutons */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .btn {
      height: 60px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.1s ease;
      outline: none;
    }

    /* Style neumorphique pour tous les boutons */
    .btn-number {
      background: #e8e8e8;
      color: #2a2a2a;
      box-shadow:
        4px 4px 8px #c8c8c8,
        -4px -4px 8px #ffffff;
    }
    .btn-number:hover { background: #efefef; }
    .btn-number:active {
      box-shadow:
        inset 4px 4px 8px #c8c8c8,
        inset -4px -4px 8px #ffffff;
    }

    .btn-operator {
      background: #e8e8e8;
      color: #4a6fa5;
      font-size: 1.3rem;
      font-weight: 500;
      box-shadow:
        4px 4px 8px #c8c8c8,
        -4px -4px 8px #ffffff;
    }
    .btn-operator:hover { color: #2a4f85; background: #efefef; }
    .btn-operator:active {
      box-shadow:
        inset 4px 4px 8px #c8c8c8,
        inset -4px -4px 8px #ffffff;
    }

    .btn-equal {
      background: #4a6fa5;
      color: #ffffff;
      font-size: 1.3rem;
      box-shadow:
        4px 4px 8px #c8c8c8,
        -4px -4px 8px #ffffff;
    }
    .btn-equal:hover { background: #3a5f95; }
    .btn-equal:active {
      box-shadow:
        inset 4px 4px 8px #3a5080,
        inset -4px -4px 8px #5a7fb5;
    }

    .btn-clear {
      background: #e8e8e8;
      color: #c0392b;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow:
        4px 4px 8px #c8c8c8,
        -4px -4px 8px #ffffff;
    }
    .btn-clear:hover { color: #a93226; background: #efefef; }
    .btn-clear:active {
      box-shadow:
        inset 4px 4px 8px #c8c8c8,
        inset -4px -4px 8px #ffffff;
    }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="screen">
      <div class="screen-expression" id="expression"></div>
      <div class="screen-result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Ligne 1 -->
      <button class="btn btn-clear" onclick="clearAll()">AC</button>
      <button class="btn btn-clear" onclick="deleteLast()">⌫</button>
      <button class="btn btn-operator" onclick="inputOperator('%')">%</button>
      <button class="btn btn-operator" onclick="inputOperator('/')">÷</button>

      <!-- Ligne 2 -->
      <button class="btn btn-number" onclick="inputNumber('7')">7</button>
      <button class="btn btn-number" onclick="inputNumber('8')">8</button>
      <button class="btn btn-number" onclick="inputNumber('9')">9</button>
      <button class="btn btn-operator" onclick="inputOperator('*')">×</button>

      <!-- Ligne 3 -->
      <button class="btn btn-number" onclick="inputNumber('4')">4</button>
      <button class="btn btn-number" onclick="inputNumber('5')">5</button>
      <button class="btn btn-number" onclick="inputNumber('6')">6</button>
      <button class="btn btn-operator" onclick="inputOperator('-')">−</button>

      <!-- Ligne 4 -->
      <button class="btn btn-number" onclick="inputNumber('1')">1</button>
      <button class="btn btn-number" onclick="inputNumber('2')">2</button>
      <button class="btn btn-number" onclick="inputNumber('3')">3</button>
      <button class="btn btn-operator" onclick="inputOperator('+')">+</button>

      <!-- Ligne 5 -->
      <button class="btn btn-number btn-zero" onclick="inputNumber('0')">0</button>
      <button class="btn btn-number" onclick="inputDecimal()">.</button>
      <button class="btn btn-equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let currentInput = '0';
    let expression = '';
    let shouldResetInput = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = currentInput;
      expressionEl.textContent = expression;
    }

    function inputNumber(num) {
      if (shouldResetInput) {
        currentInput = num;
        shouldResetInput = false;
      } else {
        currentInput = currentInput === '0' ? num : currentInput + num;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (shouldResetInput) {
        currentInput = '0.';
        shouldResetInput = false;
      } else if (!currentInput.includes('.')) {
        currentInput += '.';
      }
      updateDisplay();
    }

    function inputOperator(op) {
      shouldResetInput = false;
      const displayOp = op === '*' ? '×' : op === '/' ? '÷' : op === '-' ? '−' : op;
      expression = currentInput + ' ' + displayOp + ' ';
      currentInput = currentInput;
      shouldResetInput = true;
      updateDisplay();
    }

    function calculate() {
      if (!expression) return;
      try {
        const fullExpr = expression + currentInput;
        expressionEl.textContent = fullExpr + ' =';
        const raw = expression.replace('×', '*').replace('÷', '/').replace('−', '-');
        const result = Function('"use strict"; return (' + raw + currentInput + ')')();
        currentInput = parseFloat(result.toFixed(10)).toString();
        expression = '';
        shouldResetInput = true;
        resultEl.textContent = currentInput;
      } catch {
        currentInput = 'Erreur';
        expression = '';
        updateDisplay();
      }
    }

    function clearAll() {
      currentInput = '0';
      expression = '';
      shouldResetInput = false;
      updateDisplay();
    }

    function deleteLast() {
      if (shouldResetInput) return;
      currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
      updateDisplay();
    }

    // Clavier
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === '+') inputOperator('+');
      else if (e.key === '-') inputOperator('-');
      else if (e.key === '*') inputOperator('*');
      else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') deleteLast();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
